<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.login-box{
    background:#1f2937;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

a{
    display:block;
    margin-top:15px;
    color:#60a5fa;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Iniciar Sesión</h2>

    <input type="text" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">

    <button>Ingresar</button>

    <a href="index.html">Volver al inicio</a>
</div>

</body>
</html>
