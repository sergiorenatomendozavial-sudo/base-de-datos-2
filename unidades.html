<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portafolio Académico</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:black;
    color:#e5d3a1;
}

/* MATRIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
    background:rgba(0,0,0,0.7);
    border-bottom:1px solid #e5d3a1;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{
    width:50px;
}

.menu{
    display:flex;
    gap:35px;
}

.menu a{
    text-decoration:none;
    color:#e5d3a1;
    position:relative;
}

.menu a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0%;
    height:2px;
    background:#e5d3a1;
    transition:0.3s;
}

.menu a:hover::after{
    width:100%;
}

/* HEADER */
.header{
    text-align:center;
    padding:50px;
}

.header h1{
    text-shadow:0 0 15px #e5d3a1;
}

/* CONTENEDOR */
.contenedor{
    display:grid;
    grid-template-columns: repeat(2, 420px);
    justify-content:center;
    gap:60px;
    padding:40px;
}

/* UNIDAD */
.unidad{
    background:rgba(0,0,0,0.7);
    border:1px solid #e5d3a1;
    border-radius:20px;
    padding:30px;
}

.unidad h2{
    text-align:center;
    text-shadow:0 0 10px #e5d3a1;
}

/* SEMANAS */
.semanas{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:20px;
}

.semana{
    padding:15px;
    border:1px solid #e5d3a1;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.semana:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #e5d3a1;
}

/* DETALLE */
.detalle{
    display:none;
    margin-top:10px;
}

/* BOTON PDF */
.btn{
    display:block;
    margin:5px 0;
    padding:8px;
    background:#a38b5d;
    color:#000;
    text-decoration:none;
    border-radius:6px;
}

.btn:hover{
    box-shadow:0 0 10px #e5d3a1;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="upla.png">
        <div>
            <h3>Universidad Peruana Los Andes</h3>
            <span>Mendoza Vial Sergio</span>
        </div>
    </div>

    <div class="menu">
        <a href="index.html">Inicio</a>
        <a href="#">Unidades</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<!-- HEADER -->
<div class="header">
    <h1>Portafolio Académico</h1>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

<script>
function bloque(num){
return `
<div>
    <div class="semana" onclick="toggle(${num})">Semana ${num}</div>
    <div id="det${num}" class="detalle">Cargando...</div>
</div>
`;
}
</script>

<div class="unidad">
<h2>Unidad 1</h2>
<div class="semanas">
<script>document.write(bloque(1)+bloque(2)+bloque(3)+bloque(4));</script>
</div>
</div>

<div class="unidad">
<h2>Unidad 2</h2>
<div class="semanas">
<script>document.write(bloque(5)+bloque(6)+bloque(7)+bloque(8));</script>
</div>
</div>

<div class="unidad">
<h2>Unidad 3</h2>
<div class="semanas">
<script>document.write(bloque(9)+bloque(10)+bloque(11)+bloque(12));</script>
</div>
</div>

<div class="unidad">
<h2>Unidad 4</h2>
<div class="semanas">
<script>document.write(bloque(13)+bloque(14)+bloque(15)+bloque(16));</script>
</div>
</div>

</div>

<footer>
© 2026 - Presentación Académica
</footer>

<!-- ================= JS ================= -->
<script>
const usuario = "sergiorenatomendozavial-sudo";
const repo = "base-de-datos-2";

async function cargarPDFs(semana){
    let url = `https://api.github.com/repos/${usuario}/${repo}/contents/Semana${semana}`;

    try{
        let res = await fetch(url);
        let data = await res.json();

        let div = document.getElementById("det"+semana);
        div.innerHTML = "";

        data.forEach(file=>{
            if(file.name.endsWith(".pdf")){
                let viewer = `https://docs.google.com/gview?embedded=1&url=${file.download_url}`;
                div.innerHTML += `<a class="btn" href="${viewer}" target="_blank">📄 ${file.name}</a>`;
            }
        });

        if(div.innerHTML===""){
            div.innerHTML="No hay archivos";
        }

    }catch{
        document.getElementById("det"+semana).innerHTML="Error al cargar";
    }
}

function toggle(n){
    let el = document.getElementById("det"+n);
    let visible = el.style.display==="block";

    el.style.display = visible ? "none" : "block";

    if(!visible) cargarPDFs(n);
}
</script>

<!-- MATRIX -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
let fontSize = 14;
let columns = canvas.width/fontSize;
let drops = Array.from({length:columns}).map(()=>1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#0f0";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,33);
</script>

</body>
</html>
